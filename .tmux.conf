# TER OS Tabbed Status Bar
set -g status-style bg=default,fg=colour253
set -g status-left "#[range=user|new_win,fg=colour173,bold]  +  #[norange]"
set -g status-left-length 50
# Big thumb button on the bottom right to cycle tabs
set -g status-right ' #[fg=colour173,bg=default,bold]  ⏭   '

# 2-line status bar showing tabs on top, and a matching empty padding line underneath
set -g status 2
set -g status-format[1] "#[align=left]     #[list=on]#{W:             ,#[bg=colour173]             #[bg=default]}"

# Start tab numbers at 1 (easier to read)
set -g base-index 1
setw -g pane-base-index 1
set-option -g allow-rename on

# The active tab style (Soft Pastel Blue)
set-window-option -g window-status-current-style bg=colour173,fg=colour232,bold
set -g window-status-current-format "[#I:#{p8:#{=8:pane_title}}] "

# The inactive tab style (Darker background)
set-window-option -g window-status-style bg=default,fg=colour253
set -g window-status-format " #I:#{p8:#{=8:pane_title}}  "


# Easy split
bind | split-window -h
bind - split-window -v

# Mouse support (scroll + tap panes)
# Toggle mouse on/off dynamically with Prefix + m 
set -g mouse on
bind m set-option -g mouse \; display-message "Mouse #{?mouse,ON,OFF}"
bind -n MouseDown1StatusRight next-window
bind -n MouseDown1Status \
  if -F '#{==:#{mouse_status_range},window}' { select-window } \
  \; if -F '#{==:#{mouse_status_range},new_win}' { new-window } \
  \; if -F '#{==:#{mouse_status_range},zoom_pane}' { resize-pane -Z } \
  \; if -F '#{==:#{mouse_status_range},layout_next}' { next-layout } \
  \; if -F '#{==:#{mouse_status_range},clear_screen}' { send-keys C-l } \
  \; if -F '#{==:#{mouse_status_range},kill_pane}' { confirm-before -p "Kill pane #P? (y/n)" kill-pane }

# Make mouse scrolling significantly faster and force it to scroll history
setw -g mode-keys vi
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -N 5 -X scroll-up' 'copy-mode -e; send-keys -N 5 -X scroll-up'"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -N 5 -X scroll-down' 'send-keys -M'"
bind -T copy-mode-vi WheelUpPane send-keys -N 5 -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -N 5 -X scroll-down

# UI / Performance
set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g pane-scrollbars off

# FIX AUTOSCROLL & VIEWPORT: Prevent window constraints / dots in background by adjusting to latest client size
set -g window-size latest
setw -g aggressive-resize on
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'  # Removed: disabling smcup/rmcup causes scrollback pollution

# Quick jump to bottom
bind -n End send-keys -X history-bottom

# PERFORMANCE TWEAKS
# Set escape-time to 0 to prevent lag/hanging when hitting Esc
set -s escape-time 0

# Increase responsiveness
set -g repeat-time 0

# Fix potential hang by ensuring terminal is handled correctly
set -g focus-events on
set -g default-command "${SHELL}"

# Consistent Prefix-Based Navigation
bind c new-window
bind p previous-window
bind n next-window
# (Pane navigation defaults to Prefix + Arrows)

# Help hint (Prefix + h)
bind h display-message "Help: run 'ter -h' for full cheat sheet"

# Change prefix to ~ (Tilde) for mobile
unbind C-b
set-option -g prefix '~'
bind '~' send-prefix

# Soothing eye-preserving pane styles (Aubergine Wine & Peach Cream - Transparent Backgrounds)
set -g window-style 'bg=default,fg=colour181'
set -g window-active-style 'bg=default,fg=colour224'
set -g pane-border-style 'fg=default,bg=default'
set -g pane-active-border-style 'fg=default,bg=default'
