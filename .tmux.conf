# TER OS Tabbed Status Bar
set -g status-style bg=colour239,fg=colour253
set -g status-left " "
set -g status-left-length 50
set -g status-right ' #[fg=colour205]🖱 #{?mouse,ON,OFF} '

# Start tab numbers at 1 (easier to read)
set -g base-index 1
setw -g pane-base-index 1
set-option -g allow-rename on

# The active tab style (Cyan background, Bold)
set-window-option -g window-status-current-style bg=colour51,fg=colour232,bold
set -g window-status-current-format "[#I:#{=15:pane_title}] "

# The inactive tab style (Darker background)
set-window-option -g window-status-style bg=colour236,fg=colour253
set -g window-status-format " #I:#{=15:pane_title}  "


# Easy split
bind | split-window -h
bind - split-window -v

# Mouse support (scroll + tap panes)
# Toggle mouse on/off dynamically with Prefix + m (or click the status bar)
set -g mouse on
bind m set-option -g mouse \; display-message "Mouse #{?mouse,ON,OFF}"
bind -n MouseDown1StatusRight set-option -g mouse \; display-message "Mouse #{?mouse,ON,OFF}"

# Make mouse scrolling significantly faster and force it to scroll history
setw -g mode-keys vi
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X halfpage-up' 'copy-mode -e; send-keys -X halfpage-up'"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X halfpage-down' 'send-keys -M'"
bind -T copy-mode-vi WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-vi WheelDownPane send-keys -X halfpage-down

# UI / Performance
set -g default-terminal "screen-256color"
set -g history-limit 50000

# FIX AUTOSCROLL: Do NOT jump to bottom when output arrives if we are scrolling up
setw -g aggressive-resize on
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'  # Removed: disabling smcup/rmcup causes scrollback pollution

# Quick jump to bottom
bind -n End send-keys -X history-bottom

# PERFORMANCE TWEAKS
# Set escape-time to 0 to prevent lag/hanging when hitting Esc
set -s escape-time 0

# Increase responsiveness
set -g repeat-time 0

# Fix potential hang by ensuring terminal is handled correctly
set -g focus-events on
set -g default-command "${SHELL}"

# Mobile-Friendly Shortcuts (No Prefix Required)
bind -n C-n new-window       # Ctrl+n to create a new tab
bind -n M-Left previous-window # Alt+Left to go to previous tab
bind -n M-Right next-window    # Alt+Right to go to next tab

# Change prefix to ~ (Tilde) for mobile
unbind C-b
set-option -g prefix '~'
bind '~' send-prefix
